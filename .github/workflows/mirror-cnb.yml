name: Mirror to CNB

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  mirror:
    name: Push to CNB
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to CNB mirror
        env:
          CNB_USERNAME: ${{ secrets.CNB_USERNAME }}
          CNB_TOKEN: ${{ secrets.CNB_TOKEN }}
        run: |
          if [ -z "$CNB_USERNAME" ] || [ -z "$CNB_TOKEN" ]; then
            echo "CNB credentials not configured, skipping mirror"
            exit 0
          fi

          REPO="cnb.cool/Lingqi_Team/Tianxuan.git"
          REMOTE_URL="https://${CNB_USERNAME}:${CNB_TOKEN}@${REPO}"

          git remote add cnb "$REMOTE_URL" 2>/dev/null || git remote set-url cnb "$REMOTE_URL"
          git push cnb --force --all
          git push cnb --force --tags

          echo "Mirror to CNB completed"
