name: Release APK to CNB

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  release:
    name: Build & push to CNB
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Decode keystore and create key.properties
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > android/app/tianxuan.keystore
            cat > android/app/key.properties << EOF
          storeFile=tianxuan.keystore
          storePassword=$KEYSTORE_PASSWORD
          keyAlias=$KEY_ALIAS
          keyPassword=$KEY_PASSWORD
          EOF
            echo "Release signing configured"
          else
            echo "No keystore secret found, will use debug signing"
          fi

      - name: Build APK
        run: flutter build apk --release

      - name: Push APK to CNB releases branch
        env:
          CNB_USERNAME: ${{ secrets.CNB_USERNAME }}
          CNB_TOKEN: ${{ secrets.CNB_TOKEN }}
        run: |
          if [ -z "$CNB_USERNAME" ] || [ -z "$CNB_TOKEN" ]; then
            echo "CNB credentials not configured, skipping"
            exit 0
          fi

          # Determine version from pubspec.yaml
          VERSION="v$(grep '^version:' pubspec.yaml | sed 's/version: //' | cut -d+ -f1)"
          echo "VERSION=$VERSION"

          APK_SRC="build/app/outputs/flutter-apk/app-release.apk"
          APK_NAME="tianxuan-${VERSION}.apk"

          # Build release assets in temp directory
          WORKDIR=$(mktemp -d)
          cp "$APK_SRC" "$WORKDIR/$APK_NAME"

          # Write version manifest
          cat > "$WORKDIR/releases.json" << EOF
          {
            "latest": "$VERSION",
            "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "files": {
              "apk": "$APK_NAME"
            }
          }
          EOF

          cd "$WORKDIR"
          git init
          git checkout -b releases
          git config user.name "Tianxuan CI"
          git config user.email "ci@tianxuan.local"
          git add "$APK_NAME" releases.json
          git commit -m "Release $VERSION"

          CNB_URL="https://${CNB_USERNAME}:${CNB_TOKEN}@cnb.cool/Lingqi_Team/Tianxuan.git"
          git push --force "$CNB_URL" releases

          echo "Done: https://cnb.cool/Lingqi_Team/Tianxuan/-/raw/releases/$APK_NAME"
